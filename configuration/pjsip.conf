;=========== General settings ===========
[global]
type=global
user_agent=Asterisk PBX
debug=yes

;=========== Transports ===========
; >>> REPLACE YOUR_PUBLIC_IP with your server's actual public/routable IP <<<

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0
local_net=172.17.0.0/16
external_media_address=YOUR_PUBLIC_IP
external_signaling_address=YOUR_PUBLIC_IP

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0
local_net=172.17.0.0/16
external_media_address=YOUR_PUBLIC_IP
external_signaling_address=YOUR_PUBLIC_IP

[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0
local_net=172.17.0.0/16
external_media_address=YOUR_PUBLIC_IP
external_signaling_address=YOUR_PUBLIC_IP

;=========== Extension 300 (legacy UDP) ===========
[300]
type=endpoint
context=from-internal
message_context=messages
disallow=all
allow=alaw,ulaw
allow=h264,vp8
auth=300
aors=300
callerid=300
identify_by=username,auth_username
direct_media=no
force_rport=yes
rewrite_contact=yes

[300]
type=auth
auth_type=userpass
password=300
username=300

[300]
type=aor
max_contacts=1

;=========== Extension 400 (WebRTC) ===========
[400]
type=aor
max_contacts=5
remove_existing=yes

[400]
type=auth
auth_type=userpass
username=400
password=400

[400]
type=endpoint
aors=400
auth=400
callerid=400
dtls_auto_generate_cert=yes
webrtc=yes
use_avpf=yes
media_use_received_transport=yes
rtcp_mux=yes
context=from-internal
message_context=messages
disallow=all
allow=alaw,ulaw
allow=h264,vp8
identify_by=username,auth_username
direct_media=no
force_rport=yes
rewrite_contact=yes

;=========== Extension 500 (WebRTC) ===========
[500]
type=aor
max_contacts=5
remove_existing=yes

[500]
type=auth
auth_type=userpass
username=500
password=500

[500]
